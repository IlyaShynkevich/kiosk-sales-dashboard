[build]
  publish = "."

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=300"

